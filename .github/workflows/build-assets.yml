name: Build assets

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'css/scss/**'
      - 'js/**/*.js'
      - '!js/*.min.js'
      - '!css/*.min.css'
      - 'gulpfile-shared.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: MODULE_NAME=saturne node node_modules/gulp/bin/gulp.js --gulpfile gulpfile-shared.js build

      - name: Commit built assets if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force css/saturne.min.css js/saturne.min.js
          if ! git diff --staged --quiet; then
            git commit -m "[CI] chore: build assets JS/CSS minified"
            git push
          fi
